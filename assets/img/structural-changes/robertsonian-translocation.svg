<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
<title id="title">Robertsonian translocation</title>
<desc id="desc">The long arms of two acrocentric chromosomes fuse near the centromere. </desc>
<rect width="1000" height="650" rx="32" fill="#fffaf1"/>
<rect x="28" y="28" width="944" height="594" rx="28" class="box"/>

  <style>
    .title{font:800 34px system-ui,-apple-system,Segoe UI,sans-serif;fill:#43141d}
    .subtitle{font:600 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .label{font:800 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1f2933}
    .small{font:650 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .gene{font:800 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
    .note{font:700 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#582536}
    .arrow{stroke:#773344;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#667085;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .box{fill:#fff;stroke:#e5d9cf;stroke-width:2}
  </style>
<text x="60" y="85" class="title">Robertsonian translocation</text>
<text x="60" y="118" class="subtitle">The long arms of two acrocentric chromosomes fuse near the centromere.</text>

<text x="70" y="180" class="label">Before: two acrocentric chromosomes</text>
<!-- chromosome 14 -->
<rect x="190" y="210" width="62" height="75" rx="25" fill="#d89f5b"/><circle cx="221" cy="300" r="18" fill="#43141d"/><rect x="190" y="318" width="62" height="200" rx="28" fill="#773344"/>
<text x="221" y="248" class="gene">p</text><text x="221" y="415" class="gene">14q</text><text x="178" y="555" class="small">chromosome 14</text>
<!-- chromosome 21 -->
<rect x="380" y="225" width="62" height="60" rx="25" fill="#d89f5b"/><circle cx="411" cy="300" r="18" fill="#43141d"/><rect x="380" y="318" width="62" height="155" rx="28" fill="#315f6b"/>
<text x="411" y="252" class="gene">p</text><text x="411" y="395" class="gene">21q</text><text x="368" y="510" class="small">chromosome 21</text>
<path d="M500 330 L605 330" class="arrow"/><path d="M590 315 L605 330 L590 345" class="arrow"/>
<text x="635" y="180" class="label">After: der(14;21)</text>
<!-- derivative -->
<rect x="695" y="230" width="70" height="150" rx="30" fill="#773344"/><circle cx="730" cy="395" r="20" fill="#43141d"/><rect x="695" y="415" width="70" height="125" rx="30" fill="#315f6b"/>
<text x="730" y="305" class="gene">14q</text><text x="730" y="475" class="gene">21q</text>
<path d="M285 220 C430 150 610 155 685 245" class="thin" stroke-dasharray="9 8"/>
<text x="480" y="145" class="note" text-anchor="middle">short-arm material is usually lost</text>
<text x="625" y="575" class="small">A balanced carrier often has 45 chromosomes.</text>
</svg>