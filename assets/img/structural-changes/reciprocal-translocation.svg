<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc"><title id="title">Reciprocal translocation</title><desc id="desc">Two non-homologous chromosomes exchange segments.</desc><rect width="1000" height="650" rx="32" fill="#fffaf1"/><rect x="28" y="28" width="944" height="594" rx="28" class="box"/>
  <style>
    .title{font:800 34px system-ui,-apple-system,Segoe UI,sans-serif;fill:#43141d}
    .subtitle{font:600 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .label{font:800 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1f2933}
    .small{font:650 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .gene{font:800 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
    .note{font:700 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#582536}
    .arrow{stroke:#773344;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#667085;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .box{fill:#fff;stroke:#e5d9cf;stroke-width:2}
  </style><text x="60" y="85" class="title">Reciprocal translocation</text><text x="60" y="118" class="subtitle">Two non-homologous chromosomes exchange segments.</text><text x="60" y="223" class="label">Chr 1</text><rect x="200" y="190" width="98" height="58" rx="12" fill="#773344"/><text x="249.0" y="219" class="gene">A</text><rect x="325" y="190" width="98" height="58" rx="12" fill="#9d5364"/><text x="374.0" y="219" class="gene">B</text><rect x="450" y="190" width="98" height="58" rx="12" fill="#d89f5b"/><text x="499.0" y="219" class="gene">C</text><rect x="575" y="190" width="98" height="58" rx="12" fill="#c7773d"/><text x="624.0" y="219" class="gene">D</text><text x="60" y="318" class="label">Chr 2</text><rect x="200" y="285" width="98" height="58" rx="12" fill="#d89f5b"/><text x="249.0" y="314" class="gene">W</text><rect x="325" y="285" width="98" height="58" rx="12" fill="#c7773d"/><text x="374.0" y="314" class="gene">X</text><rect x="450" y="285" width="98" height="58" rx="12" fill="#4e7c7a"/><text x="499.0" y="314" class="gene">Y</text><rect x="575" y="285" width="98" height="58" rx="12" fill="#315f6b"/><text x="624.0" y="314" class="gene">Z</text><path d="M575 235 C690 260 690 330 575 355" class="arrow"/><path d="M589 337 L575 355 L560 339" class="arrow"/><path d="M575 330 C455 350 455 395 575 415" class="arrow"/><path d="M558 398 L575 415 L592 398" class="arrow"/><text x="60" y="475" class="label">der(1)</text><rect x="200" y="440" width="98" height="58" rx="12" fill="#773344"/><text x="249.0" y="469" class="gene">A</text><rect x="325" y="440" width="98" height="58" rx="12" fill="#9d5364"/><text x="374.0" y="469" class="gene">B</text><rect x="450" y="440" width="98" height="58" rx="12" fill="#d89f5b"/><text x="499.0" y="469" class="gene">C</text><rect x="575" y="440" width="98" height="58" rx="12" fill="#315f6b"/><text x="624.0" y="469" class="gene">Z</text><text x="60" y="565" class="label">der(2)</text><rect x="200" y="530" width="98" height="58" rx="12" fill="#d89f5b"/><text x="249.0" y="559" class="gene">W</text><rect x="325" y="530" width="98" height="58" rx="12" fill="#c7773d"/><text x="374.0" y="559" class="gene">X</text><rect x="450" y="530" width="98" height="58" rx="12" fill="#4e7c7a"/><text x="499.0" y="559" class="gene">Y</text><rect x="575" y="530" width="98" height="58" rx="12" fill="#c7773d"/><text x="624.0" y="559" class="gene">D</text><text x="705" y="420" class="note">D and Z exchange</text><text x="200" y="625" class="small">A carrier may be balanced, but abnormal meiotic segregation can produce unbalanced gametes.</text></svg>