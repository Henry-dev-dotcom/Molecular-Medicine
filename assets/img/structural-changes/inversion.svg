<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
<title id="title">Inversion</title>
<desc id="desc">A segment breaks and reinserts in the opposite orientation. </desc>
<rect width="1000" height="650" rx="32" fill="#fffaf1"/>
<rect x="28" y="28" width="944" height="594" rx="28" class="box"/>

  <style>
    .title{font:800 34px system-ui,-apple-system,Segoe UI,sans-serif;fill:#43141d}
    .subtitle{font:600 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .label{font:800 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#1f2933}
    .small{font:650 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#667085}
    .gene{font:800 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
    .note{font:700 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#582536}
    .arrow{stroke:#773344;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#667085;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .box{fill:#fff;stroke:#e5d9cf;stroke-width:2}
  </style>
<text x="60" y="85" class="title">Inversion</text>
<text x="60" y="118" class="subtitle">A segment breaks and reinserts in the opposite orientation.</text>

<text x="60" y="235" class="label">Normal</text><rect x="175" y="205" width="92" height="58" rx="12" fill="#773344" opacity="1"/><text x="221.0" y="234" class="gene">A</text><rect x="285" y="205" width="92" height="58" rx="12" fill="#9d5364" opacity="1"/><text x="331.0" y="234" class="gene">B</text><rect x="395" y="205" width="92" height="58" rx="12" fill="#d89f5b" opacity="1"/><text x="441.0" y="234" class="gene">C</text><rect x="505" y="205" width="92" height="58" rx="12" fill="#c7773d" opacity="1"/><text x="551.0" y="234" class="gene">D</text><rect x="615" y="205" width="92" height="58" rx="12" fill="#4e7c7a" opacity="1"/><text x="661.0" y="234" class="gene">E</text><rect x="725" y="205" width="92" height="58" rx="12" fill="#315f6b" opacity="1"/><text x="771.0" y="234" class="gene">F</text>
<path d="M500 290 C610 315 610 345 500 365" class="arrow"/><path d="M513 345 L500 365 L485 349" class="arrow"/>
<text x="60" y="435" class="label">Inversion</text><rect x="175" y="405" width="92" height="58" rx="12" fill="#773344" opacity="1"/><text x="221.0" y="434" class="gene">A</text><rect x="285" y="405" width="92" height="58" rx="12" fill="#9d5364" opacity="1"/><text x="331.0" y="434" class="gene">B</text><rect x="395" y="405" width="92" height="58" rx="12" fill="#c7773d" opacity="1"/><text x="441.0" y="434" class="gene">D</text><rect x="505" y="405" width="92" height="58" rx="12" fill="#d89f5b" opacity="1"/><text x="551.0" y="434" class="gene">C</text><rect x="615" y="405" width="92" height="58" rx="12" fill="#4e7c7a" opacity="1"/><text x="661.0" y="434" class="gene">E</text><rect x="725" y="405" width="92" height="58" rx="12" fill="#315f6b" opacity="1"/><text x="771.0" y="434" class="gene">F</text>
<path d="M395 375 Q500 335 605 375" class="thin"/><text x="500" y="330" class="note" text-anchor="middle">segment C–D reverses</text>
<text x="175" y="565" class="small">Often balanced, but breakpoints may disrupt genes and meiosis can produce unbalanced gametes.</text>
</svg>